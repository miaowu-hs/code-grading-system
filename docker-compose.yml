version: '3.8'

services:
  code-grading-backend:
    build: .
    ports:
      - "8085:8080"  # 避免与现有服务冲突
    environment:
      - SPRING_AI_DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - SPRING_AI_DASHSCOPE_CHAT_OPTIONS_MODEL=qwen3-coder-next
    networks:
      - resume-screening-network
    restart: unless-stopped

networks:
  resume-screening-network:
    external: true