server:
  port: ${SERVER_PORT:8085}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/code_grading_system?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:789***tyu}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false

logging:
  level:
    com.example.codegradingsystem: INFO

ai:
  api:
    key: ${AI_API_KEY:}
    url: ${AI_API_URL:}
  model: ${AI_MODEL:}
