<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 编程作业批改系统</title>
    <link rel="icon" href="data:,">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(180deg, #eef4ff 0%, #f8fbff 100%);
            min-height: 100vh;
        }

        .page-shell {
            max-width: 960px;
            margin: 0 auto;
            padding: 48px 16px 80px;
        }

        .hero {
            margin-bottom: 24px;
        }

        .hero h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #17325c;
        }

        .hero p {
            color: #48607f;
            margin-bottom: 0;
        }

        .card {
            border: 0;
            border-radius: 18px;
            box-shadow: 0 18px 40px rgba(28, 65, 120, 0.08);
        }

        .loading,
        .result-panel {
            display: none;
        }

        pre {
            background: #0f172a;
            color: #e2e8f0;
            border-radius: 12px;
            padding: 12px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .badge-soft {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            background: #dbeafe;
            color: #1d4ed8;
            font-size: 0.9rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="page-shell">
    <section class="hero">
        <span class="badge-soft">Docker 已就绪</span>
        <h1 class="mt-3">AI 编程作业批改系统</h1>
        <p>提交 Java、Python 或 C++ 代码，查看编译结果、运行输出和 AI 中文评语。</p>
    </section>

    <section class="card mb-4">
        <div class="card-body p-4 p-md-5">
            <form id="submissionForm">
                <div class="mb-3">
                    <label for="language" class="form-label">编程语言</label>
                    <select class="form-select" id="language" required>
                        <option value="java">Java</option>
                        <option value="python">Python</option>
                        <option value="cpp">C++</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="sourceCode" class="form-label">源码</label>
                    <textarea class="form-control" id="sourceCode" rows="14" placeholder="请在这里粘贴代码..." required></textarea>
                </div>

                <div class="mb-4">
                    <label for="testCases" class="form-label">测试用例（JSON）</label>
                    <textarea class="form-control" id="testCases" rows="4" placeholder='[{"input": "", "expectedOutput": "Hello World"}]'></textarea>
                </div>

                <button type="submit" class="btn btn-primary px-4">提交代码</button>
            </form>
        </div>
    </section>

    <div id="loading" class="loading alert alert-info">正在执行提交，请稍候...</div>

    <section id="resultPanel" class="result-panel card">
        <div class="card-body p-4 p-md-5">
            <div id="resultContent"></div>
        </div>
    </section>
</div>

<script>
    const form = document.getElementById("submissionForm");
    const loading = document.getElementById("loading");
    const resultPanel = document.getElementById("resultPanel");
    const resultContent = document.getElementById("resultContent");

    form.addEventListener("submit", async (event) => {
        event.preventDefault();

        loading.style.display = "block";
        resultPanel.style.display = "none";

        let testCases;
        try {
            testCases = JSON.parse(document.getElementById("testCases").value || "[]");
        } catch (error) {
            loading.style.display = "none";
            showError("测试用例必须是合法的 JSON。");
            return;
        }

        const payload = {
            language: document.getElementById("language").value,
            sourceCode: document.getElementById("sourceCode").value,
            testCases
        };

        try {
            const response = await fetch("/api/submissions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            const result = await response.json();
            loading.style.display = "none";

            if (response.ok) {
                displayResult(result);
            } else {
                showError(result.message || "提交失败。");
            }
        } catch (error) {
            loading.style.display = "none";
            showError("网络错误：" + error.message);
        }
    });

    function displayResult(result) {
        const execution = result.executionResult || {};
        let html = `
            <h2 class="h4 mb-3">执行结果</h2>
            <p><strong>状态：</strong>${translateStatus(result.status || "UNKNOWN")}</p>
            <p><strong>编译是否成功：</strong>${execution.compileSuccess ? "是" : "否"}</p>
            <p><strong>运行是否成功：</strong>${execution.runtimeSuccess ? "是" : "否"}</p>
            <p><strong>执行耗时：</strong>${execution.executionTime || 0} ms</p>
            <p><strong>输出结果：</strong></p>
            <pre>${escapeHtml(execution.output || execution.errorMessage || "")}</pre>
        `;

        if (result.aiFeedback) {
            html += `
                <h3 class="h5 mt-4">AI 评语</h3>
                <p><strong>代码质量：</strong>${result.aiFeedback.codeQuality}/100</p>
                <p><strong>说明：</strong>${escapeHtml(result.aiFeedback.explanation || "")}</p>
                ${renderList("改进建议", result.aiFeedback.suggestions)}
                ${renderList("修复步骤", result.aiFeedback.fixSteps)}
                ${renderList("知识点", result.aiFeedback.knowledgePoints)}
            `;
        }

        resultContent.innerHTML = html;
        resultPanel.style.display = "block";
    }

    function renderList(title, items) {
        if (!Array.isArray(items) || items.length === 0) {
            return "";
        }
        return `
            <p class="mt-3 mb-2"><strong>${title}:</strong></p>
            <ul>${items.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul>
        `;
    }

    function showError(message) {
        resultContent.innerHTML = `<div class="alert alert-danger mb-0">${escapeHtml(message)}</div>`;
        resultPanel.style.display = "block";
    }

    function translateStatus(status) {
        switch (status) {
            case "COMPLETED":
                return "已完成";
            case "FAILED":
                return "失败";
            case "NOT_FOUND":
                return "未找到";
            default:
                return status;
        }
    }

    function escapeHtml(value) {
        return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll("\"", "&quot;")
            .replaceAll("'", "&#39;");
    }
</script>
</body>
</html>
